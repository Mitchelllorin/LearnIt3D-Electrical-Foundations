name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web course
        run: npm run build:web

      - name: Package Windows desktop app
        run: npm run package:win

      - name: Upload web build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/web
          if-no-files-found: error

      - name: Upload desktop build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-build
          path: dist/desktop
          if-no-files-found: error
